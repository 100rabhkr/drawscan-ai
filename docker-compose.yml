services:
  ollama:
    image: ollama/ollama:latest
    container_name: drawscan-ollama
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q minicpm || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  drawscan:
    build: .
    container_name: drawscan-ai
    depends_on:
      ollama:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "8500:8000"
    environment:
      - DB_PATH=/app/data/drawscan.db
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llava:7b
      - EXTRACTION_TIMEOUT=600
      - FLAGS_use_mkldnn=0
      - MKLDNN_CACHE_CAPACITY=0
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - MAX_FILE_SIZE_MB=20
    volumes:
      - drawscan-data:/app/data
      - drawscan-uploads:/app/uploads
      - drawscan-outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drawscan.rule=Host(`united.360labs.ai`)"
      - "traefik.http.routers.drawscan.entrypoints=websecure"
      - "traefik.http.routers.drawscan.tls.certresolver=letsencrypt"
      - "traefik.http.services.drawscan.loadbalancer.server.port=8000"
      - "traefik.http.routers.drawscan-http.rule=Host(`united.360labs.ai`)"
      - "traefik.http.routers.drawscan-http.entrypoints=web"
      - "traefik.http.routers.drawscan-http.middlewares=drawscan-redirect"
      - "traefik.http.middlewares.drawscan-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.drawscan-redirect.redirectscheme.permanent=true"

volumes:
  drawscan-data:
  drawscan-uploads:
  drawscan-outputs:
  ollama-models:
